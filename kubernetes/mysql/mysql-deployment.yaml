apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        tier: backend
        component: database
        app: mysql
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
    spec:
      # mysql image runs as the non-root "mysql" user (uid/gid 999), but the
      # hostPath-backed PV is owned by root and fsGroup does not apply to
      # hostPath volumes. chown the data directory up front so mysql can
      # write it (fixes CrashLoop on "data directory ... is not writable").
      initContainers:
        - name: init-chown-data
          image: busybox:latest
          imagePullPolicy: Always
          command: ["chown", "-R", "999:999", "/var/lib/mysql"]
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: yurak/mysql:latest
          imagePullPolicy: Always
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --max_connections=200
            - --wait_timeout=60
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: mysql-configmap
                  key: tz
          livenessProbe:
            tcpSocket:
              port: 3306
          readinessProbe:
            tcpSocket:
              port: 3306
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
        - name: mysql-exporter
          image: prom/mysqld-exporter:v0.19.0
          args:
            - --mysqld.address=localhost:3306
            - --mysqld.username=root
          ports:
            - containerPort: 9104
          env:
            # DATA_SOURCE_NAME was removed in mysqld-exporter v0.15.0.
            # Connection is now configured via --mysqld.* flags and this env var.
            - name: MYSQLD_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-exporter-password
          livenessProbe:
            tcpSocket:
              port: 9104
          readinessProbe:
            tcpSocket:
              port: 9104
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
