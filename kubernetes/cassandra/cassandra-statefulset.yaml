apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  labels:
    app: cassandra
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        tier: backend
        component: database
        app: cassandra
    spec:
      terminationGracePeriodSeconds: 1800
      # cassandra image runs as the non-root "cassandra" user (uid/gid 999),
      # but the hostPath-backed PV is owned by root and fsGroup does not apply
      # to hostPath volumes. chown the data directory up front so cassandra can
      # write it (fixes CrashLoop on
      # "AccessDeniedException: /opt/cassandra/data/commitlog").
      initContainers:
        - name: init-chown-data
          image: busybox:latest
          imagePullPolicy: Always
          command: ["chown", "-R", "999:999", "/opt/cassandra/data"]
          volumeMounts:
            - name: cassandra-persistent-storage
              mountPath: /opt/cassandra/data
      containers:
        - name: cassandra
          image: yurak/cassandra:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7000
              name: intra-node
            - containerPort: 7001
              name: tls-intra-node
            - containerPort: 7199
              name: jmx
            - containerPort: 9042
              name: cql
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - nodetool drain
          env:
            - name: MAX_HEAP_SIZE
              value: 512M
            - name: HEAP_NEWSIZE
              value: 100M
            - name: CASSANDRA_SEEDS
              value: "cassandra-0.cassandra.default.svc.cluster.local"
            - name: CASSANDRA_CLUSTER_NAME
              value: "webapp-cluster"
            - name: CASSANDRA_DC
              value: "webapp-datacenter"
            - name: CASSANDRA_RACK
              value: "webapp-rack"
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: "GossipingPropertyFileSnitch"
            - name: CASSANDRA_KEYSPACE
              value: "webapp"
          # cassandra 5.0 takes ~1-2 min to open the CQL port (9042). Without a
          # startupProbe the livenessProbe fired during startup and the kubelet
          # killed the container (drain -> exit 143) in a CrashLoop. The
          # startupProbe holds liveness off until the port is up (max 5 min).
          startupProbe:
            tcpSocket:
              port: 9042
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 9042
          readinessProbe:
            exec:
              command:
                - /opt/cassandra/bin/cqlsh
                - -u
                - cassandra
                - -p
                - cassandra
                - -e
                - describe keyspace webapp
            initialDelaySeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            # cassandra 5.0 places the commitlog under storagedir
            # (/opt/cassandra/data/commitlog), so mount the PV there and chown
            # it (see initContainer) to fix the startup AccessDeniedException.
            - name: cassandra-persistent-storage
              mountPath: /opt/cassandra/data
      volumes:
        - name: cassandra-persistent-storage
          persistentVolumeClaim:
            claimName: cassandra-pvc
